# Codex profile: edit-capable worker subagent.
# Install as $CODEX_HOME/editor.config.toml (default ~/.codex/editor.config.toml),
# then run:  codex exec -p editor - < prompt.md
# Feed the prompt from a file (or redirect < /dev/null when passing the prompt as
# an argument): codex exec reads stdin and wedges on a harness's open pipe.

# GPT-5.6 Sol is exploratory by default: give the worker a precise, bounded task
# and completion criterion in the prompt, or it will keep widening scope.
model = "gpt-5.6-sol"
model_reasoning_effort = "high"

# Bounded autonomy: edit files and run commands inside the workspace without
# approval prompts. Use danger-full-access only inside an external container/VM.
sandbox_mode = "workspace-write"

# Non-interactive: never pause for approvals.
approval_policy = "never"
