# Codex profile: edit-capable worker subagent.
# Install as $CODEX_HOME/editor.config.toml (default ~/.codex/editor.config.toml),
# then run:  codex exec -p editor "Implement the TODO in src/parser.rs."

model = "gpt-5.5"
model_reasoning_effort = "high"

# Edit-capable: can modify files within the workspace (via apply_patch); system dirs
# stay protected.
sandbox_mode = "workspace-write"

# Non-interactive: never pause for approvals.
approval_policy = "never"
